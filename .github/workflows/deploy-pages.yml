name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_AUTH_HASH_HEX: ${{ secrets.EXAM_AUTH_HASH_HEX }}
          # Default: project Pages URL `https://<user>.github.io/<repo>/` — set repo variable `VITE_PAGES_BASE` to `/` for org/root sites.
          VITE_PAGES_BASE: ${{ vars.VITE_PAGES_BASE }}
        run: |
          if [ -z "$VITE_AUTH_HASH_HEX" ]; then
            echo "::error::Missing Actions secret EXAM_AUTH_HASH_HEX. In the repo: Settings → Secrets and variables → Actions → New repository secret. Name: EXAM_AUTH_HASH_HEX, Value: 64-char hex from \`npm run gen-auth-hash -- 'your-passphrase'\` (hash only, no quotes). Then re-run this workflow."
            exit 1
          fi
          if [ -z "$VITE_PAGES_BASE" ]; then
            export VITE_PAGES_BASE="/${GITHUB_REPOSITORY##*/}/"
          fi
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
