name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Either repository secret name works. Only this env var (with VITE_ prefix)
          # is read by Vite and baked into the JS; GitHub secret names are arbitrary.
          VITE_AUTH_HASH_HEX: ${{ secrets.EXAM_AUTH_HASH_HEX || secrets.VITE_AUTH_HASH_HEX }}
          # Default: project Pages URL `https://<user>.github.io/<repo>/` — set repo variable `VITE_PAGES_BASE` to `/` for org/root sites.
          VITE_PAGES_BASE: ${{ vars.VITE_PAGES_BASE }}
        run: |
          if [ -z "$VITE_AUTH_HASH_HEX" ]; then
            echo "::error::At least one of repository secrets EXAM_AUTH_HASH_HEX or VITE_AUTH_HASH_HEX must be set to the 64-char hex (hash only) from: npm run gen-auth-hash. See DEPLOYMENT.md"
            exit 1
          fi
          # Do not log the value; length should be 64 for a SHA-256 hex string.
          echo "Passphrase hash length: ${#VITE_AUTH_HASH_HEX} (expected 64)"
          if [ "${#VITE_AUTH_HASH_HEX}" -ne 64 ]; then
            echo "::warning::Hash length is not 64. Secret value may include extra characters (newline, spaces, or the whole VITE_AUTH_HASH_HEX=... line). Re-paste only the 64 hex characters."
          fi
          if [ -z "$VITE_PAGES_BASE" ]; then
            export VITE_PAGES_BASE="/${GITHUB_REPOSITORY##*/}/"
          fi
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
